<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Day In My Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #e8e8f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 36px; width: 100%; max-width: 400px; }
        h1 { text-align: center; font-size: 26px; background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; font-weight: 900; }
        p.sub { text-align: center; color: #7c7c99; font-size: 13px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { font-size: 11px; color: #7c7c99; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrap { position: relative; }
        .input-wrap input { width: 100%; padding: 11px 40px 11px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #e8e8f0; font-size: 14px; outline: none; }
        .input-wrap input:focus { border-color: #f093fb; }
        .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #7c7c99; cursor: pointer; font-size: 16px; }
        .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 4px; }
        .link { text-align: center; margin-top: 16px; font-size: 13px; color: #7c7c99; }
        .link a { color: #f093fb; text-decoration: none; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ef4444; margin-bottom: 16px; }
        .success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #4ade80; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h1>🎯 Day In My Life</h1>
    <p class="sub">Create your account 🚀</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>Your Name</label>
            <div class="input-wrap">
                <input type="text" name="name" placeholder="Suji" required>
            </div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <div class="input-wrap">
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" name="password" id="regPass" placeholder="••••••••" required>
                <button type="button" class="eye-btn" onclick="togglePass('regPass', this)">👁️</button>
            </div>
        </div>
        <button type="submit" class="btn">Create Account 🎯</button>
    </form>
    <div class="link">
        Already have account? <a href="/login">Login</a>
    </div>
</div>
<script>
function togglePass(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}
</script>
</body>
</html>
